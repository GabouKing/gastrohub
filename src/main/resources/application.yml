spring:
  application:
    name: gastrohub

server:
  port: 8080

---
# Perfil: dev (padrão) — H2 em memória, Hibernate gerencia schema
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:gastrohub
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

---
# Perfil: hml — MySQL, Flyway gerencia schema
spring:
  config:
    activate:
      on-profile: hml

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gastrohub}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

  flyway:
    enabled: true

---
# Perfil: prd — MySQL, Flyway gerencia schema
spring:
  config:
    activate:
      on-profile: prd

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gastrohub}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

  flyway:
    enabled: true